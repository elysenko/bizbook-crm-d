# colossus.yaml — generated by scaffolder, read by deploy agents.
# Do not delete. The deploy agents use this instead of framework auto-detection.
# {{IMAGE_NAME}} is a placeholder substituted by the deploy agent at build time.
#
# NOTE: the requested "web" platform template (template-web) is an Angular 17 SPA +
# NestJS API pair nested under web/frontend and web/backend (not Next.js). Fields below
# reflect the actual scaffolded structure.
framework: angular
projectName: frontend
outputDir: web/frontend/dist/frontend/browser
baseHref: "/{{IMAGE_NAME}}/"
port: 80
nginx: custom
nginxConfig: web/nginx.conf
frontendDockerfile: web/Dockerfile.frontend
backend:
  name: backend
  buildDir: web/backend
  port: 3000
  dockerfile: web/Dockerfile.backend

# A second, independent standalone API service was also scaffolded per the requested
# "backend" stack entry (template-backend: NestJS + Prisma + Postgres + JWT auth REST API)
# at ./backend (its own nest-cli.json, Dockerfile, docker-compose.yml, port 3000). It is
# unrelated to web/backend above. The provisioner stage should register it as its own
# service in the services: block it appends after this file.
